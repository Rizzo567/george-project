<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Security headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <title>Prenotazione Confermata — MISTER BARBER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .conferma-page {
      background: var(--asphalt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .conferma-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-height) + 60px) var(--page-margin) 80px;
    }

    /* ─── INNER WRAPPER ─── */
    .conferma-inner {
      width: 100%;
      max-width: 900px;
      opacity: 0;
      animation: conf-appear 0.65s cubic-bezier(0.34,1.2,0.64,1) 0.15s forwards;
    }
    @keyframes conf-appear {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── TOP: CHECK + LABEL (centrati) ─── */
    .conf-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 52px;
    }

    .conf-check {
      width: 64px;
      height: 64px;
      background: #27ae60;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .conf-check svg { width: 32px; height: 32px; }
    .conf-check-path {
      fill: none;
      stroke: white;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw-check 0.4s ease 0.45s forwards;
    }
    @keyframes draw-check { to { stroke-dashoffset: 0; } }

    .conf-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: var(--eyebrow);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #27ae60;
      text-align: center;
    }

    /* ─── BOTTOM: TESTO SINISTRA + IMMAGINE DESTRA ─── */
    .conf-body {
      display: flex;
      align-items: center;
      gap: 48px;
    }

    /* Testo */
    .conf-text {
      flex: 1;
      min-width: 0;
    }

    .conf-barber-name {
      font-family: var(--font-display);
      font-size: clamp(64px, 11vw, 120px);
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 4px;
    }

    .conf-ti-aspetta {
      font-family: var(--font-display);
      font-size: clamp(40px, 7vw, 72px);
      line-height: 1;
      text-transform: uppercase;
      color: var(--canvas);
      margin-bottom: 20px;
    }

    .conf-detail {
      font-family: var(--font-body);
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--canvas-soft);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }
    .conf-detail strong {
      color: var(--canvas);
      font-weight: 600;
    }

    /* Immagine */
    .conf-img {
      flex-shrink: 0;
      width: clamp(180px, 28vw, 320px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .conf-img img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    }

    /* ─── CTA ─── */
    .conf-cta {
      margin-top: 52px;
    }
    .conf-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1.5px solid rgba(229,225,216,0.2);
      color: var(--silver);
      font-family: var(--font-body);
      font-size: var(--body-s);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 13px 26px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .conf-btn:hover {
      border-color: var(--ember);
      color: var(--ember);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .conferma-main {
        padding: calc(var(--nav-height) + 40px) 20px 60px;
        align-items: flex-start;
      }
      .conf-top { align-items: flex-start; }
      .conf-body {
        gap: 24px;
        align-items: flex-start;
      }
      .conf-img {
        width: clamp(100px, 32vw, 160px);
        flex-shrink: 0;
      }
      .conf-barber-name { font-size: clamp(44px, 13vw, 72px); }
      .conf-ti-aspetta  { font-size: clamp(28px, 9vw, 48px); }
    }
  </style>
</head>
<body class="conferma-page">

  <!-- NAVBAR -->
  <nav class="nav nav--scrolled" id="nav">
    <a href="/" class="nav__logo">Mister Barber</a>
    <ul class="nav__links" id="navLinks">
      <li><a href="/#servizi">Servizi</a></li>
      <li><a href="/#barbieri">Barbieri</a></li>
      <li><a href="/#posto">Il Posto</a></li>
    </ul>
    <a href="prenota.html" class="nav__cta">Prenota</a>
    <button class="nav__hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="conferma-main">
    <div class="conferma-inner">

      <!-- CHECK + LABEL centrati -->
      <div class="conf-top">
        <div class="conf-check">
          <svg viewBox="0 0 50 40">
            <polyline class="conf-check-path" points="4,20 18,34 46,4"/>
          </svg>
        </div>
        <p class="conf-label">Prenotazione confermata</p>
      </div>

      <!-- TESTO SX + IMMAGINE DX -->
      <div class="conf-body">

        <div class="conf-text">
          <p class="conf-barber-name" id="confName">—</p>
          <p class="conf-ti-aspetta">Ti aspetta</p>
          <p class="conf-detail" id="confDetail">—</p>
        </div>

        <div class="conf-img">
          <img id="confThumb" src="" alt="">
        </div>

      </div>

      <div class="conf-cta">
        <a href="/" class="conf-btn">← Torna alla home</a>
      </div>

    </div>
  </main>

  <script>
    (function () {
      var MONTHS = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                    'luglio','agosto','settembre','ottobre','novembre','dicembre'];
      var DAYS   = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];

      var raw = sessionStorage.getItem('mbooking');
      var validBarber = false, validDate = false, validTime = false;
      var b = null;
      try {
        b = raw ? JSON.parse(raw) : null;
        if (b && typeof b === 'object') {
          validBarber = b.barber === 'george' || b.barber === 'berlin';
          validDate   = typeof b.date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(b.date);
          validTime   = typeof b.time === 'string' && /^([01]\d|2[0-3]):[0-5]\d$/.test(b.time);
        }
      } catch (e) { b = null; }

      if (b && validBarber && validDate && validTime) {
        var name = b.barber === 'george' ? 'George' : 'Berlin';
        var d    = new Date(b.date + 'T12:00:00');
        var dateStr = DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()];

        // SECURITY: usa textContent / createElement invece di innerHTML con valori
        document.getElementById('confName').textContent = name;
        var detail = document.getElementById('confDetail');
        detail.textContent = ''; // clear
        var strong1 = document.createElement('strong');
        strong1.textContent = dateStr;
        detail.appendChild(strong1);
        detail.appendChild(document.createElement('br'));
        detail.appendChild(document.createTextNode('alle '));
        var strong2 = document.createElement('strong');
        strong2.textContent = b.time;
        detail.appendChild(strong2);

        var thumbMap = {
          george: 'assets/img/character/george-fit1_3_-removebg-preview.png',
          berlin: 'assets/img/berlin-thumb.png'
        };
        document.getElementById('confThumb').src = thumbMap[b.barber];
        document.getElementById('confThumb').alt = name;

        sessionStorage.removeItem('mbooking');
      } else {
        document.getElementById('confName').textContent  = 'Grazie';
        document.getElementById('confDetail').textContent = 'Ti contatteremo presto.';
        document.getElementById('confThumb').style.display = 'none';
      }

      // Navbar
      document.getElementById('hamburger').addEventListener('click', function () {
        document.getElementById('nav').classList.toggle('nav--open');
      });
    })();
  </script>

</body>
</html>
