<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prenotazione Confermata — MISTER BARBER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .conferma-page {
      background: var(--asphalt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── MAIN ─── */
    .conferma-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-height) + 60px) var(--page-margin) 80px;
    }

    .conferma-inner {
      max-width: 640px;
      width: 100%;
      opacity: 0;
      animation: conf-appear 0.7s cubic-bezier(0.34,1.3,0.64,1) 0.2s forwards;
    }

    @keyframes conf-appear {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── CHECK ICON ─── */
    .conf-check {
      width: 72px;
      height: 72px;
      background: #27ae60;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .conf-check svg {
      width: 36px;
      height: 36px;
    }
    .conf-check-path {
      fill: none;
      stroke: white;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw-check 0.4s ease 0.5s forwards;
    }
    @keyframes draw-check { to { stroke-dashoffset: 0; } }

    /* ─── LABEL ─── */
    .conf-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: var(--eyebrow);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #27ae60;
      margin-bottom: 16px;
    }

    /* ─── TITLE ─── */
    .conf-title {
      font-family: var(--font-display);
      font-size: clamp(52px, 10vw, 96px);
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--canvas);
      margin-bottom: 40px;
    }

    /* ─── BARBER BLOCK ─── */
    .conf-barber {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
      padding: 24px;
      background: #111;
      border: 1px solid rgba(229,225,216,0.08);
    }
    .conf-barber__img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--ember);
      flex-shrink: 0;
    }
    .conf-barber__img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .conf-barber__info {
      flex: 1;
    }
    .conf-barber__name {
      font-family: var(--font-display);
      font-size: 48px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--canvas);
      line-height: 1;
      margin-bottom: 8px;
    }
    .conf-barber__detail {
      font-family: var(--font-body);
      font-size: var(--body);
      color: var(--silver);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    .conf-barber__detail strong {
      color: var(--canvas);
      font-weight: 600;
    }

    /* ─── THUMB IMG ─── */
    /* Placeholder — user will provide thumbs-up image */
    .conf-thumb {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--ember);
      flex-shrink: 0;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    /* ─── CTA ─── */
    .conf-cta {
      margin-top: 40px;
    }
    .conf-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: none;
      border: 1.5px solid rgba(229,225,216,0.25);
      color: var(--canvas);
      font-family: var(--font-body);
      font-size: var(--body-s);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 28px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .conf-btn:hover {
      border-color: var(--ember);
      color: var(--ember);
    }

    @media (max-width: 600px) {
      .conferma-main {
        padding: calc(var(--nav-height) + 40px) 20px 60px;
        align-items: flex-start;
      }
      .conf-barber {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .conf-title { font-size: clamp(44px, 14vw, 72px); }
    }
  </style>
</head>
<body class="conferma-page">

  <!-- NAVBAR -->
  <nav class="nav nav--scrolled" id="nav">
    <a href="/" class="nav__logo">Mister Barber</a>
    <ul class="nav__links" id="navLinks">
      <li><a href="/#servizi">Servizi</a></li>
      <li><a href="/#barbieri">Barbieri</a></li>
      <li><a href="/#posto">Il Posto</a></li>
    </ul>
    <a href="prenota.html" class="nav__cta">Prenota</a>
    <button class="nav__hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="conferma-main">
    <div class="conferma-inner" id="confContent">

      <!-- Check icon -->
      <div class="conf-check">
        <svg viewBox="0 0 50 40">
          <polyline class="conf-check-path" points="4,20 18,34 46,4"/>
        </svg>
      </div>

      <p class="conf-label">Ordine confermato</p>

      <h1 class="conf-title" id="confTitle">—</h1>

      <div class="conf-barber" id="confBarber">
        <!-- filled by JS -->
      </div>

      <div class="conf-cta">
        <a href="/" class="conf-btn">← Torna alla home</a>
      </div>

    </div>
  </main>

  <script>
    (function () {
      var MONTHS = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                    'luglio','agosto','settembre','ottobre','novembre','dicembre'];
      var DAYS   = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];

      var raw = sessionStorage.getItem('mbooking');
      if (!raw) {
        document.getElementById('confTitle').textContent = 'Grazie!';
        document.getElementById('confBarber').innerHTML =
          '<p style="font-family:var(--font-body);color:var(--silver);letter-spacing:0.04em;">Ti contatteremo presto per confermare il tuo appuntamento.</p>';
        return;
      }

      var booking = JSON.parse(raw);
      var name    = booking.barber === 'george' ? 'George' : 'Berlin';

      // Date formatting
      var dateObj = new Date(booking.date + 'T12:00:00');
      var dateStr = DAYS[dateObj.getDay()] + ' ' +
                    dateObj.getDate() + ' ' + MONTHS[dateObj.getMonth()];

      document.getElementById('confTitle').textContent = name;

      // Barber img — face photo
      var faceImg = 'assets/img/' + booking.barber + '-face.png';

      // Thumbs-up image — user will provide assets/img/<barber>-thumb.png
      // For now shows emoji as fallback
      var thumbSrc = 'assets/img/' + booking.barber + '-thumb.png';

      document.getElementById('confBarber').innerHTML =
        '<div class="conf-barber__img">' +
          '<img src="' + faceImg + '" alt="' + name + '" onerror="this.style.display=\'none\'">' +
        '</div>' +
        '<div class="conf-barber__info">' +
          '<p class="conf-barber__name">' + name + '</p>' +
          '<p class="conf-barber__detail">' +
            'Ti aspetta <strong>' + dateStr + '</strong><br>' +
            'alle <strong>' + booking.time + '</strong>' +
          '</p>' +
        '</div>' +
        '<div class="conf-thumb" id="thumbWrap">' +
          '<img src="' + thumbSrc + '" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'👍\'">' +
        '</div>';

      // Clear session after read
      sessionStorage.removeItem('mbooking');
    })();

    // Navbar
    var hamburger = document.getElementById('hamburger');
    var navLinks  = document.getElementById('navLinks');
    hamburger.addEventListener('click', function () {
      document.getElementById('nav').classList.toggle('nav--open');
    });
  </script>

</body>
</html>
