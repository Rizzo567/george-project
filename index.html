<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mister Barber — Milano · Brera. Due barbieri. Un taglio.">
  <title>MISTER BARBER</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">Mister Barber</a>
    <ul class="nav__links" id="navLinks">
      <li><a href="#servizi">Servizi</a></li>
      <li><a href="#barbieri">Barbieri</a></li>
      <li><a href="#posto">Il Posto</a></li>
      <li><a href="#drop">Drop</a></li>
    </ul>
    <a href="prenota.html" class="nav__cta">Prenota</a>
    <button class="nav__hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MAIN -->
  <main id="main">

    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero__media">
        <video class="hero__video" autoplay muted loop playsinline>
          <source src="assets/videos/hero-video.mp4" type="video/mp4">
        </video>
        <div class="hero__overlay"></div>
      </div>
    </section>

    <div class="section-fade"></div>

    <!-- CHI SIAMO -->
    <section class="s01" id="barbieri" data-screen-label="01 Chi Siamo">

      <div class="glow"></div>

      <img class="cap cap-1" src="assets/img/cap-amiri.png" alt="" />
      <img class="cap cap-2" src="assets/img/cap-ne.png" alt="" />

      <div class="s01-grid">

        <!-- LEFT — big brand mark + cta -->
        <div class="brand">
          <div class="brand-mark">
            Mister<span class="second">Barber</span>
          </div>
          <a href="prenota.html" class="btn-prenota-ora">Prenota ora</a>
        </div>

        <!-- RIGHT — chi siamo + duo -->
        <div class="chi">
          <h2 class="chi-title">Chi <span class="ember">siamo?</span></h2>

          <!-- duo of barbers -->
          <div class="duo">
            <figure class="barber barber--berlin">
              <div class="barber-img-wrap">
                <img src="assets/img/berlin.png" alt="Berlin" class="berlin" />
              </div>
              <figcaption class="barber-meta">
                <span class="barber-name">BERLIN</span>
              </figcaption>
            </figure>
            <figure class="barber barber--george">
              <figcaption class="barber-meta">
                <span class="barber-name">GEORGE</span>
              </figcaption>
              <div class="barber-img-wrap">
                <img src="assets/img/george.png" alt="George" />
              </div>
            </figure>
          </div>
        </div>

      </div>
    </section>

    <!-- VIDEO CARDS -->
    <section class="s02" id="drop">
      <div class="aurora-bg" aria-hidden="true"></div>
      <div class="cards-row">

        <div class="card-wrap card-wrap--left" data-glow>
          <div class="card-glow-inner" data-glow></div>
          <video class="card-video" muted loop playsinline preload="none">
            <source src="assets/videos/tiktok-left.mp4" type="video/mp4">
          </video>
        </div>

        <div class="card-wrap card-wrap--center" data-glow>
          <div class="card-glow-inner" data-glow></div>
          <video class="card-video" muted loop playsinline preload="none">
            <source src="assets/videos/tiktok-center.mp4" type="video/mp4">
          </video>
        </div>

        <div class="card-wrap card-wrap--right" data-glow>
          <div class="card-glow-inner" data-glow></div>
          <video class="card-video" muted loop playsinline preload="none">
            <source src="assets/videos/tiktok-right.mp4" type="video/mp4">
          </video>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__logo">Mister<br>Barber</div>

    <div class="footer__grid">
      <div>
        <p class="footer__col-label">Dove</p>
        <p class="footer__col-value">Via [indirizzo]<br>Brera, Milano</p>
      </div>
      <div>
        <p class="footer__col-label">Orari</p>
        <p class="footer__col-value">
          Mar – Sab<br>
          09:00 – 19:00
        </p>
      </div>
      <div>
        <p class="footer__col-label">Social</p>
        <div class="footer__social">
          <a href="#" target="_blank" rel="noopener">Instagram</a>
          <a href="#" target="_blank" rel="noopener">TikTok</a>
        </div>
      </div>
    </div>

    <div class="footer__bottom">
      <span>© 2026 Mister Barber</span>
      <span>P.IVA [numero]</span>
    </div>
  </footer>

  <script>
    /* glow cards — local coords per card, rAF throttled */
    let rafPending = false;
    let lastE = null;
    document.addEventListener('pointermove', (e) => {
      lastE = e;
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        rafPending = false;
        if (!lastE) return;
        document.querySelectorAll('.card-wrap[data-glow]').forEach(el => {
          const r = el.getBoundingClientRect();
          el.style.setProperty('--x', (lastE.clientX - r.left).toFixed(1));
          el.style.setProperty('--y', (lastE.clientY - r.top).toFixed(1));
          el.style.setProperty('--xp', (lastE.clientX / window.innerWidth).toFixed(2));
        });
      });
    });

    /* lazy play TikTok videos via IntersectionObserver */
    const cardVideos = document.querySelectorAll('.card-video');
    const vidObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const v = entry.target;
        if (entry.isIntersecting) { v.play().catch(() => {}); }
        else { v.pause(); }
      });
    }, { threshold: 0.2 });
    cardVideos.forEach(v => vidObserver.observe(v));
  </script>

  <script>
    const nav = document.getElementById('nav');
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    window.addEventListener('scroll', () => {
      nav.classList.toggle('nav--scrolled', window.scrollY > 80);
    });

    hamburger.addEventListener('click', () => {
      nav.classList.toggle('nav--open');
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => nav.classList.remove('nav--open'));
    });
  </script>
</body>
</html>
