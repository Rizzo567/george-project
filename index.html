<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Mister Barber — Milano · Brera. Due barbieri. Un taglio.">
  <title>MISTER BARBER</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">Mister Barber</a>
    <ul class="nav__links" id="navLinks">
      <li><a href="#servizi">Servizi</a></li>
      <li><a href="#barbieri">Barbieri</a></li>
      <li><a href="#posto">Il Posto</a></li>
      <li><a href="#drop">Drop</a></li>
    </ul>
    <a href="#" class="nav__cta">Prenota</a>
    <button class="nav__hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MAIN -->
  <main id="main">

    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero__media">
        <video class="hero__video" autoplay muted loop playsinline>
          <source src="assets/videos/hero-video-h264.mp4" type="video/mp4">
        </video>
        <div class="hero__overlay"></div>
      </div>
    </section>

    <div class="section-fade section-fade--hero"></div>

    <!-- CHI SIAMO -->
    <section class="s01" id="barbieri" data-screen-label="01 Chi Siamo">

      <div class="glow"></div>

      <img class="cap cap-2" src="assets/img/cap-ne.png" alt="" />

      <div class="s01-grid">

        <!-- LEFT — big brand mark + cta -->
        <div class="brand">
          <div class="brand-mark">
            Mister<span class="second">Barber</span>
          </div>
          <div class="btn-prenota-wrap">
            <img class="brand-necklace" src="assets/img/ch%20necklace%202.png" alt="" aria-hidden="true">
            <button class="btn-prenota-ora" type="button">Prenota ora</button>
          </div>
        </div>

        <!-- RIGHT — chi siamo + duo -->
        <div class="chi">
          <div class="chi-title-wrap">
            <h2 class="chi-title">Chi <span class="ember">siamo?</span></h2>
            <img class="cap cap-1" src="assets/img/cap-amiri.png" alt="" aria-hidden="true">
          </div>

          <!-- duo of barbers -->
          <div class="duo">
            <figure class="barber barber--berlin">
              <div class="barber-img-wrap">
                <img src="assets/img/berlin.png" alt="Berlin" class="berlin" />
              </div>
              <figcaption class="barber-meta">
                <span class="barber-name">BERLIN</span>
              </figcaption>
            </figure>
            <figure class="barber barber--george">
              <figcaption class="barber-meta">
                <span class="barber-name">GEORGE</span>
              </figcaption>
              <div class="barber-img-wrap">
                <img src="assets/img/george.png" alt="George" />
              </div>
            </figure>
          </div>
        </div>

      </div>
    </section>

    <div class="section-fade section-fade--s1s2"></div>

    <!-- VIDEO CARDS -->
    <section class="s02" id="drop">
      <div class="aurora-bg" aria-hidden="true"></div>
      <div class="cards-row">

        <div class="card-wrap card-wrap--left" data-glow>
          <div class="card-inner">
            <div class="card-glow-inner" data-glow></div>
            <video class="card-video" autoplay muted loop playsinline>
              <source src="assets/videos/tiktok-left.mp4" type="video/mp4">
            </video>
          </div>
          <img class="card-cap" src="assets/img/cap-ne.png" alt="" aria-hidden="true">
        </div>

        <div class="card-wrap card-wrap--center" data-glow>
          <div class="card-inner">
            <div class="card-glow-inner" data-glow></div>
            <video class="card-video" autoplay muted loop playsinline>
              <source src="assets/videos/tiktok-center-h264.mp4" type="video/mp4">
            </video>
          </div>
          <img class="card-cap" src="assets/img/cap-ne.png" alt="" aria-hidden="true">
        </div>

        <div class="card-wrap card-wrap--right" data-glow>
          <div class="card-inner">
            <div class="card-glow-inner" data-glow></div>
            <video class="card-video" autoplay muted loop playsinline>
              <source src="assets/videos/tiktok-right.mp4" type="video/mp4">
            </video>
          </div>
          <img class="card-cap" src="assets/img/cap-ne.png" alt="" aria-hidden="true">
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__logo">Mister<br>Barber</div>

    <div class="footer__grid">
      <div>
        <p class="footer__col-label">Dove</p>
        <p class="footer__col-value">Via [indirizzo]<br>Brera, Milano</p>
      </div>
      <div>
        <p class="footer__col-label">Orari</p>
        <p class="footer__col-value">
          Mar – Sab<br>
          09:00 – 19:00
        </p>
      </div>
      <div>
        <p class="footer__col-label">Social</p>
        <div class="footer__social">
          <a href="#" target="_blank" rel="noopener">Instagram</a>
          <a href="#" target="_blank" rel="noopener">TikTok</a>
        </div>
      </div>
    </div>

    <div class="footer__bottom">
      <span>© 2026 Mister Barber</span>
      <span>P.IVA [numero]</span>
    </div>
  </footer>

  <script>
    document.addEventListener('pointermove', (e) => {
      document.querySelectorAll('[data-glow]').forEach(el => {
        el.style.setProperty('--x', e.clientX.toFixed(2));
        el.style.setProperty('--xp', (e.clientX / window.innerWidth).toFixed(2));
        el.style.setProperty('--y', e.clientY.toFixed(2));
        el.style.setProperty('--yp', (e.clientY / window.innerHeight).toFixed(2));
      });
    });
  </script>

  <script>
    const nav = document.getElementById('nav');
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    window.addEventListener('scroll', () => {
      nav.classList.toggle('nav--scrolled', window.scrollY > 80);
    });

    hamburger.addEventListener('click', () => {
      nav.classList.toggle('nav--open');
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => nav.classList.remove('nav--open'));
    });
  </script>

  <script>
    (function() {
      var row = document.querySelector('.cards-row');
      if (!row) return;
      if (window.innerWidth > 768) return;

      var cards = Array.from(row.querySelectorAll('.card-wrap'));
      var total = cards.length;
      var current = 0;
      var animating = false;
      var timer = null;

      // Show first card
      cards[current].classList.add('is-active');

      // Autoplay all videos
      cards.forEach(function(card) {
        var v = card.querySelector('video');
        if (v) { v.muted = true; v.play().catch(function() {}); }
      });

      function advance() {
        if (animating) return;
        animating = true;

        var prev = current;
        current = (current + 1) % total;

        var leaving = cards[prev];
        var entering = cards[current];

        entering.classList.add('is-active', 'anim-enter');
        leaving.classList.add('anim-exit');

        setTimeout(function() {
          leaving.classList.remove('is-active', 'anim-exit');
          entering.classList.remove('anim-enter');
          animating = false;
        }, 360);
      }

      function startTimer() {
        clearInterval(timer);
        timer = setInterval(advance, 3000);
      }

      startTimer();
    })();
  </script>
</body>
</html>
