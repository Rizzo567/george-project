<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Prenota il tuo taglio — Mister Barber Milano · Brera">
  <title>Prenota — MISTER BARBER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">Mister Barber</a>
    <ul class="nav__links" id="navLinks">
      <li><a href="index.html#servizi">Servizi</a></li>
      <li><a href="index.html#barbieri">Barbieri</a></li>
      <li><a href="index.html#posto">Il Posto</a></li>
      <li><a href="index.html#drop">Drop</a></li>
    </ul>
    <a href="prenota.html" class="nav__cta">Prenota</a>
    <button class="nav__hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <main>
    <section class="s03" id="prenota">
      <div class="booking">

        <!-- LEFT -->
        <div class="booking__left">
          <h2 class="booking__title">Il tuo<br>prossimo<br><span class="ember">taglio.</span></h2>
          <div class="barber-picks">
            <button class="barber-pick" data-barber="george">
              <div class="barber-pick__img-wrap">
                <img src="assets/img/george-face.png" alt="George">
              </div>
              <span class="barber-pick__name">George</span>
              <span class="barber-pick__tag">Barbiere</span>
            </button>
            <button class="barber-pick" data-barber="berlin">
              <div class="barber-pick__img-wrap">
                <img src="assets/img/berlin-face.png" alt="Berlin">
              </div>
              <span class="barber-pick__name">Berlin</span>
              <span class="barber-pick__tag">Barbiere</span>
            </button>
          </div>
          <div class="booking__summary" id="booking-summary" style="display:none"></div>
          <button class="btn-book" id="btn-book" style="display:none">Conferma prenotazione <span>→</span></button>
        </div>

        <!-- RIGHT -->
        <div class="booking__right">
          <div class="booking__right-track" id="right-track">

            <div class="right-panel" id="panel-cal">
              <div class="cal" id="cal">
                <div class="cal__nav-row">
                  <button class="cal__arrow" id="cal-prev">←</button>
                  <span class="cal__label" id="cal-label"></span>
                  <button class="cal__arrow" id="cal-next">→</button>
                </div>
                <div class="cal__weekdays">
                  <span>Lun</span><span>Mar</span><span>Mer</span>
                  <span>Gio</span><span>Ven</span><span>Sab</span><span>Dom</span>
                </div>
                <div class="cal__grid" id="cal-grid"></div>
              </div>
            </div>

            <div class="right-panel right-panel--slots" id="panel-slots">
              <button class="slots__back" id="slots-back">← Cambia data</button>
              <p class="slots__label">Scegli l'orario</p>
              <div class="slots__grid" id="slots-grid"></div>
            </div>

          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__logo">Mister<br>Barber</div>
    <div class="footer__grid">
      <div>
        <p class="footer__col-label">Dove</p>
        <p class="footer__col-value">Via [indirizzo]<br>Brera, Milano</p>
      </div>
      <div>
        <p class="footer__col-label">Orari</p>
        <p class="footer__col-value">Mar – Sab<br>09:00 – 19:00</p>
      </div>
      <div>
        <p class="footer__col-label">Social</p>
        <div class="footer__social">
          <a href="#" target="_blank" rel="noopener">Instagram</a>
          <a href="#" target="_blank" rel="noopener">TikTok</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <span>© 2026 Mister Barber</span>
      <span>P.IVA [numero]</span>
    </div>
  </footer>

  <script>
    const SLOTS = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30',
                   '14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
    const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                    'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

    let selected = { barber: null, date: null, time: null };
    let calDate = new Date();
    const cal = document.getElementById('cal');
    const track = document.getElementById('right-track');

    buildCal();

    document.querySelectorAll('.barber-pick').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.barber-pick').forEach(b => b.classList.remove('barber-pick--selected'));
        btn.classList.add('barber-pick--selected');
        selected.barber = btn.dataset.barber;
        cal.classList.remove('cal--pulse');
        void cal.offsetWidth;
        cal.classList.add('cal--pulse');
        cal.addEventListener('animationend', () => cal.classList.remove('cal--pulse'), { once: true });
      });
    });

    function buildCal() {
      const y = calDate.getFullYear(), m = calDate.getMonth();
      document.getElementById('cal-label').textContent = MONTHS[m] + ' ' + y;
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      const first = new Date(y, m, 1);
      const lastDay = new Date(y, m+1, 0).getDate();
      let startDow = first.getDay();
      startDow = startDow === 0 ? 6 : startDow - 1;
      for (let i = 0; i < startDow; i++) {
        const empty = document.createElement('span');
        empty.className = 'cal__day cal__day--empty';
        grid.appendChild(empty);
      }
      const today = new Date(); today.setHours(0,0,0,0);
      for (let d = 1; d <= lastDay; d++) {
        const btn = document.createElement('button');
        btn.className = 'cal__day';
        btn.textContent = d;
        const thisDate = new Date(y, m, d);
        const dow = thisDate.getDay();
        if (thisDate < today || dow === 0) {
          btn.classList.add('cal__day--disabled');
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.cal__day--selected').forEach(b => b.classList.remove('cal__day--selected'));
            btn.classList.add('cal__day--selected');
            selected.date = thisDate;
            selected.time = null;
            hideConfirm();
            track.classList.add('track--slots');
            buildSlots();
          });
        }
        if (selected.date && thisDate.toDateString() === selected.date.toDateString())
          btn.classList.add('cal__day--selected');
        grid.appendChild(btn);
      }
    }

    document.getElementById('cal-prev').addEventListener('click', () => {
      calDate.setMonth(calDate.getMonth() - 1); buildCal();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calDate.setMonth(calDate.getMonth() + 1); buildCal();
    });

    function buildSlots() {
      const grid = document.getElementById('slots-grid');
      grid.innerHTML = '';
      SLOTS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'slot-btn';
        btn.textContent = s;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.slot-btn--selected').forEach(b => b.classList.remove('slot-btn--selected'));
          btn.classList.add('slot-btn--selected');
          selected.time = s;
          showConfirm();
        });
        grid.appendChild(btn);
      });
    }

    document.getElementById('slots-back').addEventListener('click', () => {
      track.classList.remove('track--slots');
      hideConfirm();
    });

    function showConfirm() {
      const d = selected.date;
      const dateStr = d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      const label = selected.barber.charAt(0).toUpperCase() + selected.barber.slice(1);
      const summary = document.getElementById('booking-summary');
      const btnBook = document.getElementById('btn-book');
      summary.innerHTML = `
        <div class="summary__row"><span>Barbiere</span><strong>${label}</strong></div>
        <div class="summary__row"><span>Data</span><strong>${dateStr}</strong></div>
        <div class="summary__row"><span>Orario</span><strong>${selected.time}</strong></div>
      `;
      summary.style.display = 'flex';
      btnBook.style.display = 'flex';
    }
    function hideConfirm() {
      document.getElementById('booking-summary').style.display = 'none';
      document.getElementById('btn-book').style.display = 'none';
    }

    document.getElementById('btn-book').addEventListener('click', () => {
      alert('Prenotazione confermata!\n' + selected.barber + ' — ' + selected.date.toLocaleDateString('it-IT') + ' alle ' + selected.time);
    });

    /* nav */
    const nav = document.getElementById('nav');
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    nav.classList.add('nav--scrolled');
    hamburger.addEventListener('click', () => nav.classList.toggle('nav--open'));
    navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', () => nav.classList.remove('nav--open')));
  </script>

</body>
</html>
